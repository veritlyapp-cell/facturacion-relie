<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suntat Portal | Relié Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #ef4444;
            --bg: #0f172a;
            --text: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1.5px;
        }

        .logo span { color: var(--accent); }

        h2 { font-size: 20px; font-weight: 400; color: #94a3b8; margin-bottom: 40px; }

        .input-group { margin-bottom: 25px; text-align: left; }

        label { display: block; font-size: 13px; font-weight: 600; text-transform: uppercase; color: #64748b; margin-bottom: 10px; }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-login {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-login:hover {
            background: #dc2626;
            transform: scale(1.02);
        }

        #error { color: #f87171; font-size: 14px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">RELIÉ <span>LABS</span></div>
        <h2>Portal de Facturación Electrónica</h2>

        <form id="loginForm">
            <div class="input-group">
                <label>Usuario</label>
                <input type="text" id="user" required>
            </div>
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="pass" required>
            </div>
            <button type="submit" class="btn-login">🔒 Acceder al Sistema</button>
        </form>

        <div id="error">Usuario o contraseña incorrectos.</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            const error = document.getElementById('error');

            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });

            if (response.ok) {
                window.location.href = '/facturacion';
            } else {
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
